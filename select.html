<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择你的配置</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 0;
        margin: 0;
        background: linear-gradient(
          135deg,
          #2c003e,
          #1a0028
        ); /* 暗紫色渐变背景 */
        display: flex;
        width: 100vw;
        height: 100vh;
        color: #eee;
        overflow: hidden;
      }

      .card {
        position: relative;
        background: #2a1a40; /* 深紫色卡片 */
        padding: 30px;
        box-sizing: border-box;
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
        overflow-y: auto;
      }

      .close-button {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #f3ddff;
        font-size: 22px;
        font-weight: 400;
        line-height: 1;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      .close-button:hover {
        background: rgba(255, 255, 255, 0.16);
      }

      .drag-bar {
        margin: -10px -10px 18px;
        padding: 10px 52px 10px 10px;
        border-radius: 12px;
        cursor: grab;
        user-select: none;
        background: rgba(255, 255, 255, 0.04);
        app-region: drag;
        -webkit-app-region: drag;
      }

      .drag-bar:active {
        cursor: grabbing;
      }

      .drag-handle {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 8px;
        color: #d8b9ff;
        font-size: 18px;
        letter-spacing: 2px;
        user-select: none;
        app-region: drag;
        -webkit-app-region: drag;
      }

      .drag-tip {
        text-align: center;
        color: lightpink;
        font-size: 13px;
      }

      .drag-bar h2,
      .drag-bar .drag-tip {
        margin-left: auto;
        margin-right: auto;
        width: fit-content;
        user-select: none;
        app-region: drag;
        -webkit-app-region: drag;
      }

      h2 {
        text-align: center;
        margin: 0 0 8px;
        color: #d1b3ff; /* 浅紫色标题 */
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: bold;
        color: #cfcfcf;
      }

      select,
      input,
      textarea {
        font-size: 16px;
        padding: 10px;
        width: 100%;
        border: 1px solid #555;
        border-radius: 8px;
        margin-bottom: 16px;
        background: #1f1330;
        color: #f1eaff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      select:focus,
      input:focus,
      textarea:focus {
        border-color: #9b59b6; /* 紫色高亮 */
        box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.4);
        outline: none;
      }

      button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #9b59b6; /* 紫色按钮 */
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      button:hover {
        background: #8e44ad;
      }

      button:active {
        transform: scale(0.98);
      }

    </style>
  </head>
  <body>
    <div class="card">
      <button
        id="close-button"
        class="close-button"
        type="button"
        aria-label="关闭"
      >
        ×
      </button>
      <div class="drag-bar" data-tauri-drag-region>
        <h2>请选择偏好设置</h2>
        <div class="drag-tip">
          按住这里可以拖动窗口，关闭后可通过托盘再次打开
        </div>
      </div>

      <label for="language-select">💻 编程语言</label>
      <select id="language-select">
        <option value="TypeScript">TypeScript</option>
        <option value="JavaScript">JavaScript</option>
        <option value="Python">Python</option>
        <option value="Java">Java</option>
        <option value="Rust">Rust</option>
        <option value="Golang">Golang</option>
        <option value="Ruby">Ruby</option>
        <option value="C#">C#</option>
        <option value="C++">C++</option>
        <option value="C">C</option>
        <option value="PHP">PHP</option>
        <option value="Kotlin">Kotlin</option>
        <option value="Swift">Swift</option>
        <option value="Dart">Dart</option>
        <option value="Scala">Scala</option>
        <option value="Elixir">Elixir</option>
      </select>
      <label for="direction-select">🌍截图方位选择</label>
      <select id="direction-select">
        <option value="lefthalf">屏幕左半边</option>
        <option value="righthalf">屏幕右半边</option>
        <option value="uphalf">屏幕上半边</option>
        <option value="downhalf">屏幕下半边</option>
        <option value="fullscreen">全屏</option>
      </select>

      <label for="prompt-input">✨ 提示词 (Prompt)</label>
      <textarea
        style="scrollbar-width: none"
        id="prompt-input"
        placeholder="空则为默认..."
      ></textarea>
      <label for="model-select">🧠 大模型</label>
      <select id="model-select">
        <option value="zai-org/GLM-4.5V">zai-org / GLM-4.5V</option>
        <option value="Qwen/Qwen3-VL-235B-A22B-Instruct">
          Qwen / Qwen3-VL-235B-A22B-Instruct
        </option>
        <option value="Qwen/Qwen3.5-122B-A10B">
          Qwen / Qwen3.5-122B-A10B
        </option>
        <option value="Qwen/Qwen3.5-397B-A17B">
          Qwen / Qwen3.5-397B-A17B
        </option>
        <option value="Pro/moonshotai/Kimi-K2.5">
          Pro / moonshotai / Kimi-K2.5
        </option>
      </select>
      <label for="key-input">✨ 硅基流动APIKEY</label>
      <input
        style="width: 95%"
        type="password"
        id="key-input"
        placeholder="默认隐藏..."
      />
      <button id="select-button">确认选择</button>
    </div>

    <script type="module" src="/src/select.ts"></script>
  </body>
</html>
