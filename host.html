<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地宿主管理</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 0;
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(228, 178, 74, 0.18), transparent 34%),
          linear-gradient(135deg, #1e1208, #0f141b 55%, #091218);
        display: flex;
        width: 100vw;
        height: 100vh;
        color: #f4efe6;
        overflow: hidden;
      }

      .card {
        position: relative;
        background: rgba(16, 21, 27, 0.96);
        padding: 28px;
        box-sizing: border-box;
        width: 100vw;
        height: 100vh;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .card::-webkit-scrollbar {
        display: none;
      }

      .close-button {
        position: fixed;
        top: 14px;
        right: 14px;
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #f1eadf;
        font-size: 22px;
        line-height: 1;
        border: none;
        cursor: pointer;
        z-index: 100;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      .drag-bar {
        position: sticky;
        top: 0;
        margin: -28px -28px 0;
        padding: 14px 52px 14px 38px;
        min-height: 88px;
        box-sizing: border-box;
        border-radius: 0;
        cursor: grab;
        user-select: none;
        background: rgba(16, 21, 27, 0.98);
        backdrop-filter: blur(8px);
        z-index: 10;
        app-region: drag;
        -webkit-app-region: drag;
      }

      .content-wrapper {
        padding-top: 28px;
      }

      .drag-tip {
        text-align: center;
        color: #c8b39b;
        font-size: 13px;
      }

      h2 {
        text-align: center;
        margin: 0 0 6px;
        color: #f7d68b;
      }

      .meta {
        margin: 0 0 18px;
        padding: 14px 16px;
        border: 1px solid rgba(247, 214, 139, 0.2);
        border-radius: 12px;
        background: rgba(247, 214, 139, 0.06);
      }

      .meta div {
        margin-bottom: 8px;
        word-break: break-all;
        font-size: 13px;
      }

      .section {
        margin-bottom: 20px;
        padding: 18px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .section h3 {
        margin: 0 0 14px;
        color: #f1d0a0;
      }

      .label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .label-row label {
        margin-bottom: 0;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: none;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: #f2ede5;
      }

      .icon-button:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .icon-button svg {
        width: 16px;
        height: 16px;
      }

      .license-preview {
        display: none;
        margin: -4px 0 14px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .license-preview.open {
        display: block;
      }

      .license-preview-title {
        margin-bottom: 10px;
        font-size: 12px;
        color: #c8b39b;
      }

      .license-preview-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .license-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(247, 214, 139, 0.2);
        background: rgba(247, 214, 139, 0.08);
        color: #f7e8cf;
        font-size: 12px;
        cursor: pointer;
      }

      .license-chip:hover {
        background: rgba(247, 214, 139, 0.16);
      }

      .license-chip small {
        color: #c8b39b;
      }

      .license-preview-empty {
        font-size: 13px;
        color: #c8b39b;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: bold;
        color: #ddd1c1;
      }

      input,
      textarea {
        font-size: 14px;
        padding: 10px;
        width: 100%;
        border: 1px solid #4a5460;
        border-radius: 10px;
        margin-bottom: 14px;
        background: #0b1015;
        color: #f7f8fa;
        box-sizing: border-box;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .button-row {
        display: flex;
        gap: 12px;
      }

      button {
        flex: 1;
        padding: 12px;
        font-size: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #b8842c, #e1b453);
        color: #18140f;
        font-weight: bold;
        cursor: pointer;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      .ghost {
        background: rgba(255, 255, 255, 0.08);
        color: #f2ede5;
      }

      .status {
        display: none;
        margin-top: 12px;
        font-size: 13px;
        color: #9fe2b0;
      }

      .status.error {
        color: #ff9f9f;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <button id="close-button" class="close-button" type="button" aria-label="关闭">×</button>
      <div class="drag-bar" data-tauri-drag-region>
        <h2>本地宿主管理</h2>
        <div class="drag-tip">只有当前打包机器码匹配时，才会显示这个入口</div>
      </div>

      <div class="content-wrapper">
        <div class="meta">
          <div>当前公钥：<span id="public-key">加载中...</span></div>
          <div>撤销列表地址：<span id="revocation-url">未配置</span></div>
        </div>

        <section class="section">
          <h3>签发许可证</h3>
          <label for="machine-id-input">机器码</label>
          <input id="machine-id-input" type="text" placeholder="从客户端激活窗口复制机器码" />

          <label for="license-id-input">许可证 ID</label>
          <input id="license-id-input" type="text" placeholder="例如 lic_20260419_001" />

          <label for="expires-days-input">有效期（天，默认永久）</label>
          <input id="expires-days-input" type="number" min="1" placeholder="留空表示永久，例如 30" />

          <label for="customer-input">客户标识（可空）</label>
          <input id="customer-input" type="text" placeholder="例如 alice / company-a" />

          <div class="button-row">
            <button id="issue-button" type="button">生成许可证</button>
            <button id="issue-copy-button" class="ghost" type="button">复制结果</button>
          </div>

          <label for="issued-license-output">许可证输出</label>
          <textarea id="issued-license-output" readonly placeholder="生成后的签名许可证会出现在这里"></textarea>
          <div id="issue-status" class="status"></div>
        </section>

        <section class="section">
          <h3>签名撤销列表</h3>
          <label for="revocation-version-input">版本号</label>
          <input id="revocation-version-input" type="number" min="1" value="1" />

          <div class="label-row">
            <label for="revoked-ids-input">吊销的许可证 ID（每行一个）</label>
            <button id="preview-issued-license-ids" class="icon-button ghost" type="button" aria-label="预览已保存的许可证 ID" title="预览已保存的许可证 ID">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2.25 12S5.25 6.75 12 6.75 21.75 12 21.75 12 18.75 17.25 12 17.25 2.25 12 2.25 12Z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M12 14.25A2.25 2.25 0 1 0 12 9.75a2.25 2.25 0 0 0 0 4.5Z" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </button>
          </div>
          <div id="license-preview" class="license-preview">
            <div class="license-preview-title">点击任意许可证 ID 可追加到吊销列表</div>
            <div id="license-preview-list" class="license-preview-list"></div>
          </div>
          <textarea id="revoked-ids-input" placeholder="例如&#10;lic_20260419_001&#10;lic_20260419_002"></textarea>

          <div class="button-row">
            <button id="sign-revocation-button" type="button">生成撤销列表</button>
            <button id="revocation-copy-button" class="ghost" type="button">复制结果</button>
          </div>

          <label for="signed-revocations-output">签名后的撤销列表</label>
          <textarea id="signed-revocations-output" readonly placeholder="签名后的 revocations.json 内容"></textarea>
          <div id="revocation-status" class="status"></div>
        </section>
      </div>
    </div>

    <script type="module" src="/src/host.ts"></script>
  </body>
</html>
