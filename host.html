<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地宿主管理</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 0;
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(228, 178, 74, 0.18), transparent 34%),
          linear-gradient(135deg, #1e1208, #0f141b 55%, #091218);
        display: flex;
        width: 100vw;
        height: 100vh;
        color: #f4efe6;
        overflow: hidden;
      }

      .card {
        position: relative;
        background: rgba(16, 21, 27, 0.96);
        padding: 28px;
        box-sizing: border-box;
        width: 100vw;
        height: 100vh;
        overflow-y: auto;
      }

      .close-button {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #f1eadf;
        font-size: 22px;
        line-height: 1;
        border: none;
        cursor: pointer;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      .drag-bar {
        margin: -10px -10px 18px;
        padding: 10px 52px 10px 10px;
        border-radius: 12px;
        cursor: grab;
        user-select: none;
        background: rgba(255, 255, 255, 0.04);
        app-region: drag;
        -webkit-app-region: drag;
      }

      .drag-tip {
        text-align: center;
        color: #c8b39b;
        font-size: 13px;
      }

      h2 {
        text-align: center;
        margin: 0 0 6px;
        color: #f7d68b;
      }

      .meta {
        margin: 0 0 18px;
        padding: 14px 16px;
        border: 1px solid rgba(247, 214, 139, 0.2);
        border-radius: 12px;
        background: rgba(247, 214, 139, 0.06);
      }

      .meta div {
        margin-bottom: 8px;
        word-break: break-all;
        font-size: 13px;
      }

      .section {
        margin-bottom: 20px;
        padding: 18px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .section h3 {
        margin: 0 0 14px;
        color: #f1d0a0;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: bold;
        color: #ddd1c1;
      }

      input,
      textarea {
        font-size: 14px;
        padding: 10px;
        width: 100%;
        border: 1px solid #4a5460;
        border-radius: 10px;
        margin-bottom: 14px;
        background: #0b1015;
        color: #f7f8fa;
        box-sizing: border-box;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .button-row {
        display: flex;
        gap: 12px;
      }

      button {
        flex: 1;
        padding: 12px;
        font-size: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #b8842c, #e1b453);
        color: #18140f;
        font-weight: bold;
        cursor: pointer;
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }

      .ghost {
        background: rgba(255, 255, 255, 0.08);
        color: #f2ede5;
      }

      .status {
        display: none;
        margin-top: 12px;
        font-size: 13px;
        color: #9fe2b0;
      }

      .status.error {
        color: #ff9f9f;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <button id="close-button" class="close-button" type="button" aria-label="关闭">×</button>
      <div class="drag-bar" data-tauri-drag-region>
        <h2>本地宿主管理</h2>
        <div class="drag-tip">只有配置了 LICENSE_PRIVATE_KEY 的本机才会显示这个入口</div>
      </div>

      <div class="meta">
        <div>当前公钥：<span id="public-key">加载中...</span></div>
        <div>撤销列表地址：<span id="revocation-url">未配置</span></div>
      </div>

      <section class="section">
        <h3>签发许可证</h3>
        <label for="machine-id-input">机器码</label>
        <input id="machine-id-input" type="text" placeholder="从客户端激活窗口复制机器码" />

        <label for="license-id-input">许可证 ID</label>
        <input id="license-id-input" type="text" placeholder="例如 lic_20260419_001" />

        <label for="expires-days-input">有效期（天，可空）</label>
        <input id="expires-days-input" type="number" min="1" placeholder="例如 30" />

        <label for="customer-input">客户标识（可空）</label>
        <input id="customer-input" type="text" placeholder="例如 alice / company-a" />

        <div class="button-row">
          <button id="issue-button" type="button">生成许可证</button>
          <button id="issue-copy-button" class="ghost" type="button">复制结果</button>
        </div>

        <label for="issued-license-output">许可证输出</label>
        <textarea id="issued-license-output" readonly placeholder="生成后的签名许可证会出现在这里"></textarea>
        <div id="issue-status" class="status"></div>
      </section>

      <section class="section">
        <h3>签名撤销列表</h3>
        <label for="revocation-version-input">版本号</label>
        <input id="revocation-version-input" type="number" min="1" value="1" />

        <label for="revoked-ids-input">吊销的许可证 ID（每行一个）</label>
        <textarea id="revoked-ids-input" placeholder="例如&#10;lic_20260419_001&#10;lic_20260419_002"></textarea>

        <div class="button-row">
          <button id="sign-revocation-button" type="button">生成撤销列表</button>
          <button id="revocation-copy-button" class="ghost" type="button">复制结果</button>
        </div>

        <label for="signed-revocations-output">签名后的撤销列表</label>
        <textarea id="signed-revocations-output" readonly placeholder="签名后的 revocations.json 内容"></textarea>
        <div id="revocation-status" class="status"></div>
      </section>
    </div>

    <script type="module" src="/src/host.ts"></script>
  </body>
</html>
