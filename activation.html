<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>激活授权</title>
    <link rel="icon" href="data:,">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2937, #111827 70%);
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 62%;
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.6);
            padding: 32px 28px;
        }

        .drag-bar {
            margin: -10px -10px 18px;
            padding: 10px;
            border-radius: 12px;
            cursor: grab;
            user-select: none;
            background: rgba(255, 255, 255, 0.04);
            app-region: drag;
            -webkit-app-region: drag;
        }

        .drag-tip {
            text-align: center;
            color: rgba(226, 232, 240, 0.7);
            font-size: 13px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 22px;
            text-align: center;
            app-region: drag;
            -webkit-app-region: drag;
        }

        p.description {
            margin: 0 0 24px;
            text-align: center;
            font-size: 14px;
            color: rgba(226, 232, 240, 0.8);
            app-region: drag;
            -webkit-app-region: drag;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.85);
            color: #e2e8f0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            app-region: no-drag;
            -webkit-app-region: no-drag;
        }

        textarea:focus {
            border-color: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        button.submit {
            width: 100%;
            margin-top: 16px;
            padding: 12px 0;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #06b6d4, #2563eb);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            app-region: no-drag;
            -webkit-app-region: no-drag;
        }

        button.submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button.submit:not(:disabled):hover {
            transform: translateY(-1px);
        }

        .status {
            margin-top: 18px;
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(30, 64, 175, 0.15);
            color: #bfdbfe;
            display: none;
            white-space: pre-line;
        }

        .status.error {
            background: rgba(220, 38, 38, 0.18);
            color: #fecaca;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.18);
            color: #bbf7d0;
        }

        .machine-box {
            margin: 0 0 18px;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            word-break: break-all;
            font-size: 12px;
            color: rgba(226, 232, 240, 0.9);
            app-region: no-drag;
            -webkit-app-region: no-drag;
        }

        .machine-box-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .machine-box-label {
            font-size: 12px;
            color: rgba(226, 232, 240, 0.75);
        }

        .icon-button {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: #dbeafe;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
            app-region: no-drag;
            -webkit-app-region: no-drag;
        }

        .icon-button:hover {
            background: rgba(37, 99, 235, 0.18);
            border-color: rgba(96, 165, 250, 0.38);
            transform: translateY(-1px);
        }

        .icon-button svg {
            width: 16px;
            height: 16px;
        }

        #machine-id {
            line-height: 1.6;
        }
    </style>
</head>
<body>
<main class="card">
    <div class="drag-bar" data-tauri-drag-region>
    <h1>输入许可证</h1>
    <p class="description">把当前机器码发给宿主机签发许可证，然后将收到的签名许可证完整粘贴到下方。</p>
    <div class="drag-tip">按住这里可以拖动窗口</div>
    </div>
    <div class="machine-box">
        <div class="machine-box-header">
            <div class="machine-box-label">当前机器码</div>
            <button id="copy-machine-id" class="icon-button" type="button" aria-label="复制机器码" title="复制机器码">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M9 9.75A2.25 2.25 0 0 1 11.25 7.5h7.5A2.25 2.25 0 0 1 21 9.75v7.5a2.25 2.25 0 0 1-2.25 2.25h-7.5A2.25 2.25 0 0 1 9 17.25v-7.5Z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M15 7.5V6.75A2.25 2.25 0 0 0 12.75 4.5h-7.5A2.25 2.25 0 0 0 3 6.75v7.5a2.25 2.25 0 0 0 2.25 2.25H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div id="machine-id">正在读取...</div>
    </div>
    <form id="activation-form">
        <textarea
                id="activation-code"
                placeholder="粘贴签名许可证"
                autocomplete="off"
                spellcheck="false"
        ></textarea>
        <button class="submit" type="submit">立即激活</button>
        <div id="activation-status" class="status"></div>
    </form>
</main>
<script type="module" src="/src/activation.ts"></script>
</body>
</html>
